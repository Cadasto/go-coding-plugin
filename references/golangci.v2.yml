# Reference golangci-lint v2 config for the go-coding plugin.
#
# Scaffold it into a repo with the `/go-lint-setup` command, or copy it to `.golangci.yml`.
# Schema is golangci-lint v2 — a v1 config will NOT parse. See the `go-linting` skill for
# what each linter does and why. Keep this in sync with the block inlined in
# `skills/go-lint-setup/SKILL.md`.
version: "2"

linters:
  default: standard          # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - modernize              # range-int, min/max, slices/maps, wg.Go, strings.Cut … (same engine as go fix)
    - errorlint              # %w + errors.Is/As discipline
    - bodyclose              # unclosed http.Response.Body
    - rowserrcheck           # unchecked sql.Rows.Err
    - sqlclosecheck          # unclosed sql.Rows/Stmt
    - noctx                  # HTTP/SQL issued without a context
    - contextcheck           # context not propagated through the call chain
    - containedctx           # context.Context stored in a struct field
    - perfsprint             # fmt.Sprintf where a cheaper call exists
    - revive                 # configurable golint successor

formatters:
  enable:
    - gofumpt                # stricter gofmt superset
    - goimports              # import grouping + formatting
